<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed Successfully</title>

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Space Grotesk',sans-serif;
            background:#fff;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .success-wrapper{
            text-align:center;
            max-width:650px;
            padding:40px;
        }

        .success-icon{
            font-size:80px;
            color:#28a745;
            margin-bottom:25px;
        }

        .success-title{
            font-size:48px;
            font-weight:700;
            color:#111;
            margin-bottom:20px;
        }

        .success-text{
            font-size:20px;
            color:#666;
            line-height:1.8;
            margin-bottom:40px;
        }

        .btn-continue{
            display:inline-block;
            padding:16px 40px;
            background:#111;
            color:#fff;
            text-decoration:none;
            border-radius:6px;
            font-size:18px;
            font-weight:600;
            transition:.3s;
        }

        .btn-continue:hover{
            background:#333;
        }

    </style>
</head>

<body>

    <div class="success-wrapper">

        <i class="fa-solid fa-circle-check success-icon"></i>

        <h1 class="success-title">
            Order Placed!
        </h1>

        <p class="success-text">
            Thank you for choosing our bakery! 
            Your order has been received successfully and our bakers are preparing your freshly baked treats with care. 
            You'll receive an order confirmation and delivery updates shortly.
        </p>

        <a href="product.html" class="btn-continue">
            Continue Shopping
        </a>

    </div>

</body>
</html>
